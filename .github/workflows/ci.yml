name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Run tests
        run: npm test
      - name: Rebuild bundle
        run: npm run build
      - name: Fail if committed bundle is stale
        run: git diff --exit-code dist/
